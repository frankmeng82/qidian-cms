name: CI

on:
  push:
    branches: ['**']
  pull_request:
  workflow_dispatch:
    inputs:
      run_real_e2e:
        description: 'Run real DB-backed E2E full-chain test'
        required: false
        default: false
        type: boolean
  schedule:
    - cron: '0 17 * * *'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Prepare backend env
        run: cp apps/backend/.env.example apps/backend/.env

      - name: Generate Prisma client
        run: npm run prisma:generate --workspace @qidian-cms/backend

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test:unit

      - name: Coverage report
        run: npm run test:coverage

      - name: Security smoke tests
        run: npm run test:security

      - name: Dependency audit (high+)
        continue-on-error: true
        run: npm audit --audit-level=high

      - name: Build
        run: npm run build

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: coverage-reports
          path: |
            apps/backend/coverage
            apps/frontend/coverage

  api-integration:
    runs-on: ubuntu-latest
    needs: lint-and-build
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Prepare backend env
        run: cp apps/backend/.env.example apps/backend/.env

      - name: Generate Prisma client
        run: npm run prisma:generate --workspace @qidian-cms/backend

      - name: API integration tests
        run: npm run test:api

  api-integration-real:
    runs-on: ubuntu-latest
    needs: lint-and-build
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: qidian_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test -d qidian_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    env:
      REAL_API_TESTS: 'true'
      DATABASE_URL: postgresql://test:test@localhost:5432/qidian_test?schema=public
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: test_secret_123456
      JWT_EXPIRES_IN: 7d
      NODE_ENV: test
      PORT: 3000
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Prepare backend env
        run: cp apps/backend/.env.example apps/backend/.env

      - name: Push test schema
        run: npx prisma db push --schema apps/backend/prisma/schema.prisma

      - name: Generate Prisma client
        run: npm run prisma:generate --workspace @qidian-cms/backend

      - name: Run real API integration tests
        run: npm run test:api:real

  e2e-chromium:
    if: github.event_name == 'schedule' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: lint-and-build
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Prepare backend env
        run: cp apps/backend/.env.example apps/backend/.env

      - name: Generate Prisma client
        run: npm run prisma:generate --workspace @qidian-cms/backend

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests (Chromium)
        run: npm run test:e2e:serial

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-report
          path: playwright-report

  e2e-smoke:
    runs-on: ubuntu-latest
    needs: lint-and-build
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Prepare backend env
        run: cp apps/backend/.env.example apps/backend/.env

      - name: Generate Prisma client
        run: npm run prisma:generate --workspace @qidian-cms/backend

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run E2E smoke tests (Chromium)
        run: npm run test:e2e:ci

      - name: Upload Playwright smoke report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-report-smoke
          path: playwright-report

  e2e-chromium-real:
    if: github.event_name == 'workflow_dispatch' && inputs.run_real_e2e == true
    runs-on: ubuntu-latest
    needs: lint-and-build
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: qidian_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test -d qidian_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    env:
      E2E_REAL: 'true'
      DATABASE_URL: postgresql://test:test@localhost:5432/qidian_test?schema=public
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: test_secret_123456
      JWT_EXPIRES_IN: 7d
      NODE_ENV: test
      PORT: 3000
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Prepare backend env
        run: cp apps/backend/.env.example apps/backend/.env

      - name: Push test schema
        run: npx prisma db push --schema apps/backend/prisma/schema.prisma

      - name: Generate Prisma client
        run: npm run prisma:generate --workspace @qidian-cms/backend

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run real full-chain E2E
        run: npm run test:e2e:real

      - name: Upload Playwright report (real)
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-report-real
          path: playwright-report
