name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Check required deployment secrets
        id: check_secrets
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          PROJECT_DIR: ${{ secrets.PROJECT_DIR }}
        run: |
          if [ -n "$SSH_PRIVATE_KEY" ] && [ -n "$SERVER_HOST" ] && [ -n "$SERVER_USER" ] && [ -n "$PROJECT_DIR" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Missing one or more deployment secrets; skipping deploy steps."
          fi

      - name: Setup SSH
        if: steps.check_secrets.outputs.ready == 'true'
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Deploy to Server
        if: steps.check_secrets.outputs.ready == 'true'
        env:
          HOST: ${{ secrets.SERVER_HOST }}
          USER: ${{ secrets.SERVER_USER }}
          PROJECT_DIR: ${{ secrets.PROJECT_DIR }}
        run: |
          ssh -o StrictHostKeyChecking=no $USER@$HOST << 'REMOTE_SCRIPT'
            cd $PROJECT_DIR
            
            # 拉取最新代码
            git pull origin main
            
            # 执行更新脚本
            ./scripts/deploy/update.sh docker
          REMOTE_SCRIPT

      - name: Notify Success
        if: success() && steps.check_secrets.outputs.ready == 'true'
        run: |
          echo "部署成功!"
          # 可以添加钉钉/企业微信通知

      - name: Notify Skipped
        if: steps.check_secrets.outputs.ready != 'true'
        run: echo "部署已跳过：未配置完整部署 secrets。"
