version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: qidian-postgres
    environment:
      POSTGRES_DB: qidian_cms
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    networks:
      - qidian-net

  redis:
    image: redis:7-alpine
    container_name: qidian-redis
    volumes:
      - redis_data:/data
    ports:
      - '6379:6379'
    networks:
      - qidian-net

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: qidian-backend
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/qidian_cms?schema=public
      REDIS_URL: redis://redis:6379
      JWT_SECRET: please_change_me_in_production
      JWT_EXPIRES_IN: 7d
    depends_on:
      - postgres
      - redis
    ports:
      - '3000:3000'
    networks:
      - qidian-net

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    container_name: qidian-frontend
    depends_on:
      - backend
    networks:
      - qidian-net

  nginx:
    image: nginx:1.27-alpine
    container_name: qidian-nginx
    depends_on:
      - frontend
      - backend
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - '8080:80'
    networks:
      - qidian-net

volumes:
  postgres_data:
  redis_data:

networks:
  qidian-net:
    driver: bridge
